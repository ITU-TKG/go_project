services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: testdb
      MYSQL_USER: go_user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network  # ← 追加

  app:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: go_user
      DB_NAME: testdb
      DB_PASSWORD: password
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - app-network  # ← 追加

volumes:
  db_data:

networks:
  app-network:     # ← 追加
    driver: bridge